<!DOCTYPE html>
<html>
<head>
    <title>Поиск заказа</title>
    <style>
        body { font-family: Arial; margin: 50px; }
        input { padding: 10px; width: 300px; margin-right: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; display: none; }
        pre { background: #f5f5f5; padding: 10px; overflow: auto; }
    </style>
</head>
<body>
    <h1>Поиск заказа</h1>
    
    <input type="text" id="orderId" placeholder="Введите order_uid" value="test123">
    <button onclick="searchOrder()">Найти</button>
    
    <div id="result"></div>

    <script>
        async function searchOrder() {
            const orderId = document.getElementById('orderId').value;
            const result = document.getElementById('result');
            
            if (!orderId) {
                result.style.display = 'block';
                result.innerHTML = 'Введите ID заказа';
                return;
            }
            
            try {
                const response = await fetch('/order/' + orderId);
                if (response.ok) {
                    const data = await response.json();
                    result.style.display = 'block';
                    result.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                } else {
                    result.style.display = 'block';
                    result.innerHTML = 'Заказ не найден';
                }
            } catch (error) {
                result.style.display = 'block';
                result.innerHTML = 'Ошибка соединения';
            }
        }
    </script>
</body>
</html>
